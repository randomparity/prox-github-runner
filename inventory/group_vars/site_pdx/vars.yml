runner_vm_id: 2100
runner_vm_name: "paper-archives-runner"
runner_vm_ip: "192.0.2.50"
runner_vm_gateway: "192.0.2.1"
runner_vm_nameserver: "192.0.2.1"
runner_vm_searchdomain: "example.test"
