---
# Site-specific Proxmox host. proxmox_api_host and proxmox_node are PLACEHOLDERS
# (RFC 5737 documentation range / default node name); override the real values
# in a gitignored local file, inventory/group_vars/proxmox/vars_local.yml, which
# Ansible loads after this file. proxmox_api_host is the SSH target for the node.
proxmox_api_host: "192.0.2.10"
proxmox_api_port: 8006
proxmox_node: "pve"
proxmox_storage: "local-lvm"

proxmox_template_name: "ubuntu-2404-cloud"
proxmox_template_vmid: 9000
proxmox_template_memory_mb: 2048
proxmox_template_cores: 2
proxmox_template_bridge: "vmbr0"
proxmox_template_vlan: null
proxmox_template_image_cache_dir: "/tmp/prox-github-runner"
proxmox_template_cloud_image_url: >-
  https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
proxmox_template_cloud_image_filename: "noble-server-cloudimg-amd64.img"
proxmox_template_cloud_image_checksum: >-
  sha256:5fa5b05e5ec239858c4531485d6023b0896448c2df7c63b34f8dae6ea6051a44
