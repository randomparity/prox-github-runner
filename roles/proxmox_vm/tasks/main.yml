---
- name: Validate runner VM variables
  ansible.builtin.assert:
    that:
      - (runner_vm_id | string) is match('\\A[0-9]+\\Z')
      - runner_vm_id | int >= 100
      - runner_vm_name | length > 0
      - runner_vm_ip | length > 0
      - runner_vm_ip is match('\\A[0-9]{1,3}(\\.[0-9]{1,3}){3}\\Z')
      - runner_vm_gateway | length > 0
      - (runner_vm_cidr | int) >= 1 and (runner_vm_cidr | int) <= 32
      - runner_vm_searchdomain | length > 0
      - proxmox_vm_ssh_pubkey | length > 0
      - proxmox_vm_cpu | int >= 1
      - proxmox_vm_memory_mb | int >= 2048
      - proxmox_vm_disk_gb | int >= 32
    fail_msg: "Missing or invalid runner VM configuration."

- name: Read runner VM status
  ansible.builtin.command:
    argv: ["qm", "status", "{{ runner_vm_id }}"]
  register: proxmox_vm_status
  changed_when: false
  failed_when: false

- name: Read runner VM config when present
  ansible.builtin.command:
    argv: ["qm", "config", "{{ runner_vm_id }}"]
  register: proxmox_vm_config
  changed_when: false
  when: proxmox_vm_status.rc == 0

- name: Fail on identity change (bridge) when VM exists
  ansible.builtin.fail:
    msg: >-
      Refusing an identity change on existing VM {{ runner_vm_id }}.
      Bridge change requires explicit rebuild (see unregister-runner.yml).
  when:
    - proxmox_vm_status.rc == 0
    - proxmox_vm_config.stdout is defined
    # Delimited match (negative lookahead) so a prefix name does not false-match:
    # desired vmbr0 must NOT satisfy an existing bridge=vmbr01. Fail when the
    # desired bridge is absent as a whole token.
    - >-
      proxmox_vm_config.stdout is not
      search('bridge=' ~ proxmox_template_bridge ~ '(?![0-9A-Za-z])')

- name: Clone runner VM from template
  ansible.builtin.command:
    argv: ["qm", "clone", "{{ proxmox_template_vmid }}", "{{ runner_vm_id }}",
           "--name", "{{ runner_vm_name }}", "--full", "1"]
  when: proxmox_vm_status.rc != 0
  changed_when: true

# Cloud-init identity is applied clone-time only (rc != 0). The validated
# runner_vm_ip/gateway/cidr/nameserver + bootstrap user + SSH key are meaningless
# unless the role writes them into the clone's cloud-init config; without this
# the VM boots on DHCP with no injected key and is unreachable at its static IP.
# Rewriting identity on an existing VM would be an out-of-band change, so it is
# gated to fresh clones (identity changes go through a rebuild).
- name: Write SSH public key to a temporary file for cloud-init injection
  ansible.builtin.copy:
    content: "{{ proxmox_vm_ssh_pubkey }}\n"
    dest: "{{ proxmox_vm_ssh_pubkey_file }}"
    mode: "0600"
  when: proxmox_vm_status.rc != 0

- name: Apply cloud-init identity and network to the fresh clone
  ansible.builtin.command:
    argv: ["qm", "set", "{{ runner_vm_id }}",
           "--ciuser", "{{ runner_bootstrap_user }}",
           "--sshkeys", "{{ proxmox_vm_ssh_pubkey_file }}",
           "--ipconfig0", "ip={{ runner_vm_ip }}/{{ runner_vm_cidr }},gw={{ runner_vm_gateway }}",
           "--nameserver", "{{ runner_vm_nameserver }}",
           "--searchdomain", "{{ runner_vm_searchdomain }}"]
  when: proxmox_vm_status.rc != 0
  changed_when: true

- name: Remove the temporary SSH public key file
  ansible.builtin.file:
    path: "{{ proxmox_vm_ssh_pubkey_file }}"
    state: absent
  when: proxmox_vm_status.rc != 0

# One `qm set` converges CPU, memory, and net0. The ,firewall=1 flag on net0 is
# what activates per-VM filtering: Proxmox only applies the .fw rules (rendered
# below with [OPTIONS] enable: 1) to a NIC that carries it. Precondition: the
# datacenter firewall must also be enabled on the Proxmox node, or no VM firewall
# rules take effect. The bridge is unchanged, so this does not trip the
# identity-change guard above. On a FRESH clone this runs before first boot, so
# the flag is active at start. On an already-running VM (upgrade path) enabling
# the flag needs a reboot/NIC replug to take effect; the role does not force a
# reboot (it would cancel running jobs) — reboot the VM manually to activate
# isolation. See spec Amendment 4.
- name: Converge CPU, memory, and network interface (enables VM firewall)
  ansible.builtin.command:
    argv: ["qm", "set", "{{ runner_vm_id }}",
           "--cores", "{{ proxmox_vm_cpu }}",
           "--cpu", "{{ proxmox_vm_cpu_type }}",
           "--memory", "{{ proxmox_vm_memory_mb }}",
           "--net0", "{{ proxmox_vm_net0 }}"]
  changed_when: true

- name: Grow boot disk (grow-only)
  ansible.builtin.command:
    argv: ["qm", "resize", "{{ runner_vm_id }}", "scsi0", "{{ proxmox_vm_disk_gb }}G"]
  when: proxmox_vm_status.rc != 0
  changed_when: true

- name: Render Proxmox firewall rules to a staging file
  ansible.builtin.template:
    src: firewall.fw.j2
    dest: "{{ proxmox_vm_fw_staging_path }}"
    mode: "0640"

- name: Stat staged firewall rules
  ansible.builtin.stat:
    path: "{{ proxmox_vm_fw_staging_path }}"
    checksum_algorithm: sha1
  register: proxmox_vm_fw_staged

- name: Stat installed firewall rules
  ansible.builtin.stat:
    path: "{{ proxmox_vm_fw_rules_path }}"
    checksum_algorithm: sha1
  register: proxmox_vm_fw_installed

# /etc/pve is pmxcfs (a FUSE cluster filesystem). The template/copy modules chown
# the destination (root:www-data -> root:root) and use an atomic temp+rename;
# pmxcfs rejects both with EPERM. A plain cp succeeds, so install the staged file
# with cp, only when its content differs from what is already in place.
- name: Install firewall rules into pmxcfs
  ansible.builtin.command:
    argv: ["cp", "{{ proxmox_vm_fw_staging_path }}", "{{ proxmox_vm_fw_rules_path }}"]
  when: >-
    proxmox_vm_fw_installed.stat.checksum | default('')
    != proxmox_vm_fw_staged.stat.checksum
  changed_when: true

- name: Remove staged firewall rules
  ansible.builtin.file:
    path: "{{ proxmox_vm_fw_staging_path }}"
    state: absent

- name: Start runner VM
  ansible.builtin.command:
    argv: ["qm", "start", "{{ runner_vm_id }}"]
  when: proxmox_vm_status.rc != 0
  changed_when: true

- name: Wait for SSH on the runner VM
  ansible.builtin.wait_for:
    host: "{{ runner_vm_ip }}"
    port: 22
    timeout: 600
  delegate_to: localhost
  when: proxmox_vm_wait_for_ssh | bool

# Runs from the control host (delegate_to: localhost), which holds the private
# key whose public half cloud-init injected for the bootstrap user; the pve host
# does not have it. Retries ride out the window where sshd answers on port 22
# before cloud-init has finished creating the user and installing the key.
# A rebuilt VM reuses the IP but presents a new host key, so this bootstrap probe
# must not consult or persist known_hosts (accept-new refuses a *changed* key).
# This matches ansible.cfg host_key_checking=false for the runner connection.
- name: Wait for cloud-init to finish
  ansible.builtin.command:
    argv: ["timeout", "900", "ssh",
           "-o", "StrictHostKeyChecking=no",
           "-o", "UserKnownHostsFile=/dev/null",
           "-o", "LogLevel=ERROR",
           "{{ runner_bootstrap_user }}@{{ runner_vm_ip }}",
           "cloud-init", "status", "--wait"]
  register: proxmox_vm_cloudinit
  changed_when: false
  # cloud-init --wait exit codes: 0 = done, 2 = done but degraded (a recoverable
  # error such as Proxmox's deprecated `user:` seed schema — benign), 1 = fatal,
  # 255 = ssh not ready yet. Accept done/degraded; keep retrying otherwise.
  # failed_when is required so the command module's default rc!=0 failure does
  # not override the accepted degraded (rc 2) result.
  until: proxmox_vm_cloudinit.rc in [0, 2]
  retries: 20
  delay: 15
  failed_when: proxmox_vm_cloudinit.rc not in [0, 2]
  delegate_to: localhost
  when: proxmox_vm_wait_for_ssh | bool
