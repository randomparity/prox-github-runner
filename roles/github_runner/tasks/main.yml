---
- name: Validate github_runner configuration
  ansible.builtin.assert:
    that:
      - github_runner_target_repo is match('^[^/]+/[^/]+$')
      - github_runner_labels | length > 0
      - (github_runner_count | int) >= 1
      - github_runner_version | length > 0
      - github_runner_sha256 is match('^[0-9a-f]{64}$')
    fail_msg: "Missing or invalid github_runner configuration."

- name: Ensure the runner install root exists
  ansible.builtin.file:
    path: "{{ github_runner_install_root }}"
    state: directory
    mode: "0755"

- name: Discover existing runner registration state
  ansible.builtin.find:
    paths: "{{ github_runner_install_root }}"
    patterns: ".runner"
    recurse: true
    hidden: true
  register: github_runner_existing_state

- name: Read existing runner registration state
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ github_runner_existing_state.files }}"
  loop_control:
    label: "{{ item.path }}"
  register: github_runner_state_blobs

- name: Fail on a target-repo mismatch in existing registration state
  ansible.builtin.fail:
    msg: >-
      Existing runner state at {{ item.item.path }} is registered to a
      different repository than {{ github_runner_target_repo }}.
      Run unregister-runner.yml before re-registering.
  loop: "{{ github_runner_state_blobs.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when:
    - item.content is defined
    - github_runner_target_repo not in (item.content | b64decode)
